<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Awakening | Home</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Content is now using strict internal system fonts (Segoe UI) -->
</head>

<body>
    <header class="site-header">
        <nav class="nav-container">
            <a href="#home" class="header-brand">THE GREAT AWAKENING</a>

            <ul class="header-links">
                <li><a href="#home" data-route="home">Home</a></li>
                <li class="has-mega-menu">
                    <a href="#dossiers" data-route="dossiers">Dossiers</a>
                </li>
                <li><a href="#about" data-route="about">About</a></li>
                <li><a href="#contact" data-route="contact">Contact</a></li>
            </ul>

            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span id="theme-icon-sun" class="theme-icon" style="display: none;"></span>
                <span id="theme-icon-moon" class="theme-icon"></span>
            </button>
        </nav>
    </header>

    <!-- Placed outside the header for perfect layering -->
    <div class="mega-menu">
        <div id="mega-menu-dynamic-content" class="mega-menu-content">
            <!-- Dynamically populated by DossierManager -->
        </div>
    </div>

    <main id="content-shell" aria-live="polite"></main>

    <footer class="site-footer">
        <p>&copy; 2026 The Great Awakening Research Project. All data is based on public records and factual
            documentation.</p>
    </footer>

    <script src="js/theme-manager.js"></script>
    <script src="data/dossiers.js"></script>
    <script src="js/hero-canvas.js"></script>
    <script src="js/dossier-manager.js"></script>
    <script src="js/search.js"></script>
    <script src="js/legend-search.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
