<section class="hero-fullscreen">
    <div class="hero-content">
        <h1>The Great Awakening</h1>
        <p>An independent research platform dedicated to documenting global power structures, technocratic developments, and socio-economic transformations.</p>
    </div>

    <div class="hero-search-wrapper">
        <label class="u-sr-only" for="dossier-search">Search dossiers</label>
        <input
            type="text"
            id="dossier-search"
            class="search-input-pill"
            placeholder="Search for dossiers (e.g. Agenda 2030, WEF)..."
            autocomplete="off"
            aria-autocomplete="list"
            aria-expanded="false"
            aria-controls="home-search-suggestions"
        >
        <div id="home-search-suggestions" class="search-suggestions" hidden></div>
    </div>

    <div class="scroll-indicator">
        <span class="scroll-text">Explore Research</span>
        <div class="scroll-arrow">
            <img src="svg/arrow-down.svg" alt="Scroll down" id="indicator-arrow">
        </div>
    </div>
</section>

<main class="dashboard-section">
    <div id="home-dossier-list" class="dossier-list">
        <!-- Dynamically populated by DossierManager -->
    </div>
</main>
